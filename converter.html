<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }
    h1 { margin-bottom: 30px; color: #333; }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #555;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1.1em;
    }
    input:focus { outline: none; border-color: #4a90e2; }
    .result {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      font-size: 1.2em;
      color: #333;
    }
    .result span { color: #4a90e2; font-weight: bold; font-size: 1.4em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌡️ Temperature Converter</h1>

    <div class="input-group">
      <label for="celsius">Celsius (°C)</label>
      <input type="number" id="celsius" placeholder="Enter °C" oninput="convertFromC()">
    </div>

    <div class="input-group">
      <label for="fahrenheit">Fahrenheit (°F)</label>
      <input type="number" id="fahrenheit" placeholder="Enter °F" oninput="convertFromF()">
    </div>

    <div class="result" id="result">Enter a temperature above</div>
  </div>

  <script>
    function convertFromC() {
      const c = Number(document.getElementById('celsius').value);
      const f = (c * 9/5) + 32;
      document.getElementById('fahrenheit').value = f.toFixed(1);
      document.getElementById('result').innerHTML = `<span>${c}°C</span> = <span>${f.toFixed(1)}°F</span>`;
    }

    function convertFromF() {
      const f = parseFloat(document.getElementById('fahrenheit').value);
      const c = (f - 32) * 5/9;
      document.getElementById('celsius').value = c.toFixed(1);
      document.getElementById('result').innerHTML = `<span>${f}°F</span> = <span>${c.toFixed(1)}°C</span>`;
    }
  </script>
</body>
</html>
