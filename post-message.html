<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post a Message</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #2c3e50; }
    input { width: 70%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
    button { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; background: #0f766e;
             color: white; font-size: 1rem; cursor: pointer; }
    button:hover { background: #0d5f59; }
    #result { margin-top: 1rem; padding: 0.8rem; border-radius: 8px; background: #f4f6f9; min-height: 1.4rem; }
    .error { color: #c0392b; }
  </style>
</head>
<body>

  <h1>📮 Post a Message</h1>
  <p>Sends a POST request to the class server with my own token.</p>

  <input type="text" id="messageInput" placeholder="Type your message..." />
  <button id="sendBtn">Send</button>

  <div id="result"></div>

  <script>
    const result = document.getElementById("result");

    async function postMessage(text) {
      result.textContent = "Sending...";
      try {
        const response = await fetch("https://oim.zhili.dev/message", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Token": "MirbositMirbosit"
          },
          body: JSON.stringify({ message: text })
        });

        if (!response.ok) throw new Error("HTTP " + response.status);

        const data = await response.json();
        result.textContent = "Server replied: " + JSON.stringify(data);
      } catch (err) {
        result.innerHTML = '<span class="error">Something went wrong: ' + err.message + "</span>";
      }
    }

    document.getElementById("sendBtn").addEventListener("click", () => {
      const text = document.getElementById("messageInput").value.trim();
      if (text === "") {
        result.innerHTML = '<span class="error">Please type a message first.</span>';
        return;
      }
      postMessage(text);
    });
  </script>

</body>
</html>
