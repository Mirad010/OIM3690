<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Places of Uzbekistan</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #2c3e50; }
    #count { color: #666; }
    #placesList { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .card { background: #f4f6f9; border: 1px solid #dde3ec; border-radius: 10px; padding: 1rem; }
    .card h2 { margin: 0 0 0.5rem; font-size: 1.05rem; color: #0f766e; }
    .card p { margin: 0.2rem 0; font-size: 0.9rem; }
  </style>
</head>
<body>

  <h1>🕌 Places of Uzbekistan</h1>
  <p id="count">Loading...</p>
  <div id="placesList"></div>

  <!-- only main.js is linked; it imports data.js itself -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
