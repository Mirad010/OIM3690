<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 1.8em;
      margin-bottom: 20px;
      color: #333;
    }
    .add-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
    }
    input:focus { outline: none; border-color: #4a90e2; }
    button {
      padding: 12px 20px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
    }
    button:hover { background: #357abd; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .todo-item.done span { text-decoration: line-through; color: #aaa; }
    .todo-item span { flex: 1; }
    .delete-btn {
      background: #e74c3c;
      padding: 6px 12px;
      font-size: 0.8em;
    }
    .stats { margin-top: 20px; color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>
    <div class="add-row">
      <input type="text" id="todoInput" placeholder="Add a new task..." />
      <button onclick="addTodo()">Add</button>
    </div>
    <div id="todoList"></div>
    <div class="stats" id="stats"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
